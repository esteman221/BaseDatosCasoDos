connector.name=postgresql
connection-url=jdbc:postgresql://postgres:5432/EtheriaCasoDos
connection-user=admin
connection-password=123

# 1. Evita errores de "Index out of range" y metadatos de Postgres 16
statistics.enabled=false
unsupported-type-handling=CONVERT_TO_VARCHAR

# 2. Resuelve el error "Rounding necessary" y manejo de tipos NUMBER/DECIMAL
decimal-mapping=allow_overflow
decimal-default-scale=10
decimal-rounding-mode=HALF_UP

# 3. Manejo de nombres (importante para que encuentre las tablas)
case-insensitive-name-matching=true

